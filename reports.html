<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldCore Reports</title>
    <link rel="stylesheet" href="assets/app.css">
    <script defer src="assets/layout.js"></script>
    <script defer src="assets/api.js"></script>
  </head>
  <body data-page="reports" data-title="Reports">
    <section class="page">
      <div data-reports-root>
        <div class="hero-row">
          <div class="hero-copy">
            <h2>Business Performance</h2>
            <p>Loading company-scoped reports.</p>
          </div>
          <span class="api-status" data-api-status>Connecting...</span>
        </div>
        <section class="panel">
          <div class="empty-state">
            <div>
              <strong>Loading reports</strong>
              <span>Revenue, jobs, workers, services, quotes, and customers will appear here.</span>
            </div>
          </div>
        </section>
      </div>
    </section>
  </body>
</html>
