<!DOCTYPE html>
<html lang="en">
  <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FieldCore Purchase Orders</title><link rel="stylesheet" href="assets/app.css?v=ux-stabilization-1"><script defer src="assets/ui-feedback.js"></script><script defer src="assets/layout.js"></script><script defer src="assets/enterprise-pages.js?v=ux-stabilization-1"></script></head>
  <body data-page="purchase-orders" data-title="Purchase Orders">
    <section class="page">
      <div class="hero-row"><div class="hero-copy"><p class="eyebrow">Procurement</p><h2>Purchase Orders</h2><p>Create supplier orders and receive stock into inventory with auditable order history.</p></div><span class="api-status" id="status">Loading...</span></div>
      <section class="grid two-column">
        <article class="panel"><div class="panel-head"><h3>Supplier</h3><span class="badge gray">Vendor</span></div><form id="supplierForm" class="form-grid compact-form"><div class="field"><label>Name</label><input name="name" required></div><div class="field"><label>Email</label><input name="email"></div><div class="field"><label>Phone</label><input name="phone"></div><div class="form-actions"><button class="primary-button" type="submit">Save Supplier</button></div></form></article>
        <article class="panel"><div class="panel-head"><h3>Create purchase order</h3><span class="badge gray">Stock</span></div><form id="poForm" class="form-grid compact-form"><div class="field"><label>Supplier</label><select name="supplierId"></select></div><div class="field"><label>Item</label><select name="itemId" required></select></div><div class="field"><label>Quantity</label><input name="quantity" type="number" step="0.001" min="0.001" required></div><div class="field"><label>Unit Cost</label><input name="unitCost" type="number" step="0.01" min="0"></div><div class="form-actions"><button class="primary-button" type="submit">Create PO</button></div></form></article>
      </section>
      <section class="table-card"><div class="panel-head card"><h3>Purchase Orders</h3></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Number</th><th>Status</th><th>Supplier</th><th>Lines</th><th>Actions</th></tr></thead><tbody data-purchase-orders></tbody></table></div></section>
    </section>
  </body>
</html>
