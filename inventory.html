<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldCore Inventory</title>
    <link rel="stylesheet" href="assets/app.css">
    <script defer src="assets/layout.js"></script>
  </head>
  <body data-page="inventory" data-title="Inventory">
    <section class="page">
      <div class="hero-row">
        <div class="hero-copy">
          <h2>Inventory</h2>
          <p>Track parts, stock locations, low stock, and auditable stock movements.</p>
        </div>
      </div>
      <div class="toolbar"><span class="api-status" id="status">Loading...</span></div>
      <section class="grid two-column">
        <article class="card">
          <h3>Create Item</h3>
          <form id="itemForm">
            <label>Name <input name="name" required></label>
            <label>SKU <input name="sku"></label>
            <label>Category <input name="category"></label>
            <label>Unit <input name="unitOfMeasure" value="each"></label>
            <label>Unit Cost <input name="unitCost" type="number" step="0.01" min="0"></label>
            <label>Sale Price <input name="salePrice" type="number" step="0.01" min="0"></label>
            <label>Reorder Point <input name="reorderPoint" type="number" step="0.001" min="0"></label>
            <button class="primary-button" type="submit">Save Item</button>
          </form>
        </article>
        <article class="card">
          <h3>Create Stock Location</h3>
          <form id="locationForm">
            <label>Name <input name="name" required></label>
            <label>Type
              <select name="type">
                <option>WAREHOUSE</option><option>BRANCH</option><option>VEHICLE</option><option>TECHNICIAN</option><option>OTHER</option>
              </select>
            </label>
            <label>Address <input name="address"></label>
            <button class="primary-button" type="submit">Save Location</button>
          </form>
        </article>
      </section>
      <section class="card">
        <h3>Stock Adjustment</h3>
        <form id="adjustForm" class="inline-form">
          <select name="itemId" required></select>
          <select name="locationId" required></select>
          <select name="movementType"><option>ADJUSTMENT_IN</option><option>ADJUSTMENT_OUT</option></select>
          <input name="quantity" type="number" step="0.001" min="0.001" placeholder="Quantity" required>
          <input name="reason" placeholder="Reason" required>
          <button class="primary-button" type="submit">Apply</button>
        </form>
      </section>
      <section class="table-card"><h3>Items</h3><div id="items"></div></section>
      <section class="table-card"><h3>Low Stock</h3><div id="lowStock"></div></section>
      <section class="table-card"><h3>Recent Movements</h3><div id="movements"></div></section>
    </section>
    <script>
      const API = '/api';
      const status = document.getElementById('status');
      const itemSelect = document.querySelector('#adjustForm [name="itemId"]');
      const locationSelect = document.querySelector('#adjustForm [name="locationId"]');
      async function api(path, options = {}) {
        const res = await fetch(API + path, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...options });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body?.error?.message || 'Request failed');
        return body.data;
      }
      function rows(items, columns) {
        if (!items.length) return '<div class="empty-state"><strong>No records yet</strong></div>';
        return `<table><thead><tr>${columns.map(c => `<th>${c[0]}</th>`).join('')}</tr></thead><tbody>${items.map(item => `<tr>${columns.map(c => `<td>${c[1](item) ?? ''}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      }
      async function load() {
        const [items, locations, low, movements] = await Promise.all([api('/inventory/items'), api('/stock-locations'), api('/inventory/low-stock'), api('/inventory/movements?limit=10')]);
        itemSelect.innerHTML = items.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
        locationSelect.innerHTML = locations.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
        document.getElementById('items').innerHTML = rows(items, [['Name', i => i.name], ['SKU', i => i.sku], ['Unit', i => i.unitOfMeasure], ['Reorder', i => i.reorderPoint]]);
        document.getElementById('lowStock').innerHTML = rows(low, [['Name', i => i.name], ['Available', i => i.availableQuantity], ['Reorder Point', i => i.reorderPoint]]);
        document.getElementById('movements').innerHTML = rows(movements, [['Type', m => m.movementType], ['Item', m => m.item?.name || m.itemId], ['Qty', m => m.quantity], ['Reason', m => m.reason]]);
        status.textContent = 'Connected';
      }
      function formData(form) { return Object.fromEntries(Array.from(new FormData(form)).filter(([, v]) => v !== '').map(([k, v]) => [k, v])); }
      itemForm.addEventListener('submit', async (e) => { e.preventDefault(); await api('/inventory/items', { method: 'POST', body: JSON.stringify(formData(e.target)) }); e.target.reset(); await load(); });
      locationForm.addEventListener('submit', async (e) => { e.preventDefault(); await api('/stock-locations', { method: 'POST', body: JSON.stringify(formData(e.target)) }); e.target.reset(); await load(); });
      adjustForm.addEventListener('submit', async (e) => { e.preventDefault(); await api('/inventory/adjustments', { method: 'POST', body: JSON.stringify(formData(e.target)) }); e.target.reset(); await load(); });
      load().catch(err => { status.textContent = err.message; });
    </script>
  </body>
</html>
