<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldCore Inventory</title>
    <link rel="stylesheet" href="assets/app.css?v=ux-stabilization-1">
    <script defer src="assets/layout.js"></script>
    <script defer src="assets/enterprise-pages.js?v=ux-stabilization-1"></script>
  </head>
  <body data-page="inventory" data-title="Inventory">
    <section class="page">
      <div class="hero-row">
        <div class="hero-copy"><p class="eyebrow">Stock control</p><h2>Inventory</h2><p>Track parts, stock locations, low stock, and auditable stock movements.</p></div>
        <span class="api-status" id="status">Loading...</span>
      </div>
      <section class="grid two-column">
        <article class="panel">
          <div class="panel-head"><h3>Create item</h3><span class="badge gray">Parts</span></div>
          <form id="itemForm" class="form-grid compact-form">
            <div class="field"><label>Name</label><input name="name" required></div>
            <div class="field"><label>SKU</label><input name="sku"></div>
            <div class="field"><label>Category</label><input name="category"></div>
            <div class="field"><label>Unit</label><input name="unitOfMeasure" value="each"></div>
            <div class="field"><label>Unit Cost</label><input name="unitCost" type="number" step="0.01" min="0"></div>
            <div class="field"><label>Sale Price</label><input name="salePrice" type="number" step="0.01" min="0"></div>
            <div class="field"><label>Reorder Point</label><input name="reorderPoint" type="number" step="0.001" min="0"></div>
            <div class="form-actions"><button class="primary-button" type="submit">Save Item</button></div>
          </form>
        </article>
        <article class="panel">
          <div class="panel-head"><h3>Create stock location</h3><span class="badge gray">Stores</span></div>
          <form id="locationForm" class="form-grid compact-form">
            <div class="field"><label>Name</label><input name="name" required></div>
            <div class="field"><label>Type</label><select name="type"><option>WAREHOUSE</option><option>BRANCH</option><option>VEHICLE</option><option>TECHNICIAN</option><option>OTHER</option></select></div>
            <div class="field span-2"><label>Address</label><input name="address"></div>
            <div class="form-actions span-2"><button class="primary-button" type="submit">Save Location</button></div>
          </form>
        </article>
      </section>
      <section class="panel">
        <div class="panel-head"><h3>Stock adjustment</h3><span class="badge gray">Audit logged</span></div>
        <form id="adjustForm" class="form-grid compact-form">
          <div class="field"><label>Item</label><select name="itemId" required></select></div>
          <div class="field"><label>Location</label><select name="locationId" required></select></div>
          <div class="field"><label>Movement</label><select name="movementType"><option>ADJUSTMENT_IN</option><option>ADJUSTMENT_OUT</option></select></div>
          <div class="field"><label>Quantity</label><input name="quantity" type="number" step="0.001" min="0.001" placeholder="Quantity" required></div>
          <div class="field span-2"><label>Reason</label><input name="reason" placeholder="Reason" required></div>
          <div class="form-actions"><button class="primary-button" type="submit">Apply</button></div>
        </form>
      </section>
      <section class="table-card"><div class="panel-head card"><h3>Items</h3></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Name</th><th>SKU</th><th>Unit</th><th>Reorder</th></tr></thead><tbody data-inventory-items></tbody></table></div></section>
      <section class="table-card"><div class="panel-head card"><h3>Low Stock</h3></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Name</th><th>Available</th><th>Reorder Point</th></tr></thead><tbody data-low-stock></tbody></table></div></section>
      <section class="table-card"><div class="panel-head card"><h3>Recent Movements</h3></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Type</th><th>Item</th><th>Qty</th><th>Reason</th></tr></thead><tbody data-movements></tbody></table></div></section>
    </section>
  </body>
</html>
